<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account — Slima</title>
<link rel="stylesheet" href="assets/app.css">
<style>
  .slima-logo {
    display: inline-block;
    height: 28px;
    width: auto;
    user-select: none;
  }
  .auth-page {
    min-height: 100vh;
    background: #fff;
  }
  .auth-card {
    width: 100%;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: #fff;
  }
  .auth-quote {
    background: var(--bg-mute);
    padding: 56px 64px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .auth-quote .brand-mark {
    color: var(--ink);
    display: inline-block;
    line-height: 0;
  }
  .auth-quote .quote { margin-top: auto; max-width: 380px; }
  .auth-quote blockquote {
    font-family: var(--serif);
    font-size: 22px;
    line-height: 1.45;
    color: var(--ink);
    margin: 0 0 14px;
    font-style: italic;
  }
  .auth-quote figcaption {
    font-family: var(--sans);
    font-size: 14px;
    color: var(--ink-3);
    letter-spacing: 0.02em;
  }
  .auth-form {
    padding: 40px 64px;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .auth-form__head {
    display: flex;
    justify-content: flex-end;
    font-size: 14px;
    color: var(--ink-3);
  }
  .auth-form__head a {
    color: var(--ink);
    text-decoration: underline;
    text-underline-offset: 3px;
    margin-left: 4px;
  }
  .auth-form__body {
    width: 100%;
    max-width: 380px;
    margin: auto;
  }
  .auth-form h1 {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin: 0 0 6px;
    text-align: center;
  }
  .auth-form .lede {
    color: var(--ink-3);
    font-size: 14px;
    text-align: center;
    margin: 0 0 24px;
  }
  .auth-form__foot {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--ink-4);
  }
  .auth-form__foot a { color: var(--ink-3); margin-left: 16px; }
  .form-group { margin-bottom: 12px; }
  .form-group label {
    display: block;
    font-size: 13px;
    color: var(--ink-2);
    margin-bottom: 6px;
    font-family: var(--sans);
    font-weight: 500;
  }
  .form-input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--bg);
    font-family: var(--serif);
    font-size: 15px;
    color: var(--ink);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-input:focus {
    outline: none;
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(10,10,11,0.06);
  }
  .form-hint {
    font-size: 12px;
    color: var(--ink-4);
    margin-top: 6px;
    font-family: var(--sans);
  }
  .strength {
    display: flex; gap: 4px; margin-top: 8px;
  }
  .strength span {
    flex: 1; height: 4px; border-radius: 2px;
    background: var(--bg-mute);
  }
  .strength span.on { background: var(--green); }
  .form-terms {
    display: flex; align-items: flex-start; gap: 10px;
    margin: 14px 0 18px;
    font-size: 13px;
    color: var(--ink-3);
    line-height: 1.5;
  }
  .form-terms a { color: var(--ink); text-decoration: underline; text-underline-offset: 3px; }
  .auth-divider {
    display: flex; align-items: center; gap: 12px;
    margin: 22px 0 18px;
    color: var(--ink-4);
    font-size: 12px;
    font-family: var(--sans);
    letter-spacing: 0.04em;
  }
  .auth-divider::before, .auth-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--line);
  }
  .social-row { display: grid; gap: 10px; }
  .btn--social {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    padding: 12px 16px;
    width: 100%;
    box-shadow: var(--shadow-1);
  }
  .btn--social:hover { background: var(--bg-soft); }
  .btn--social svg { width: 18px; height: 18px; }

  @media (max-width: 820px) {
    .auth-page { padding: 0; background: #fff; }
    .auth-card {
      grid-template-columns: 1fr;
      min-height: 100vh;
      border: none;
      border-radius: 0;
      box-shadow: none;
    }
    .auth-quote { display: none; }
    .auth-form { padding: 24px; }
    .auth-form__body { max-width: 420px; }
  }
</style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <aside class="auth-quote">
      <a class="brand-mark" href="index.html" aria-label="Slima — home">
        <img src="assets/logo.svg" alt="Slima" class="slima-logo">
      </a>
      <figure class="quote">
        <blockquote>"There is no greater agony than bearing an untold story inside you."</blockquote>
        <figcaption>— Maya Angelou</figcaption>
      </figure>
    </aside>

    <section class="auth-form">
      <header class="auth-form__head">
        Already have an account? <a href="login.html">Sign in</a>
      </header>

      <div class="auth-form__body">
        <h1>You're one step away from becoming a writer</h1>
        <p class="lede">Create your Slima account to start your book.</p>

        <div class="social-row">
          <button class="btn btn--social">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Continue with Google
          </button>
          <button class="btn btn--social">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 12.04c-.03-3.18 2.6-4.71 2.71-4.79-1.48-2.16-3.78-2.46-4.59-2.49-1.95-.2-3.81 1.15-4.81 1.15-1.01 0-2.53-1.13-4.16-1.1-2.13.03-4.11 1.24-5.21 3.16-2.23 3.86-.57 9.57 1.6 12.71 1.06 1.54 2.32 3.27 3.97 3.21 1.6-.07 2.2-1.04 4.13-1.04 1.92 0 2.47 1.04 4.16 1 1.72-.03 2.81-1.57 3.86-3.12 1.22-1.79 1.72-3.52 1.75-3.61-.04-.02-3.36-1.29-3.4-5.08zm-3.16-9.34C14.79 1.62 15.4.16 15.23-1.3c-1.26.05-2.79.84-3.7 1.91-.82.94-1.54 2.45-1.34 3.88 1.41.11 2.85-.71 3.7-1.79z"/></svg>
            Continue with Apple
          </button>
        </div>

        <div class="auth-divider">OR SIGN UP WITH</div>

        <form>
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" class="form-input" placeholder="Your full name" autocomplete="name">
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email">
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-input" placeholder="At least 8 characters" autocomplete="new-password">
            <div class="strength" aria-hidden="true">
              <span class="on"></span><span class="on"></span><span class="on"></span><span></span>
            </div>
            <div class="form-hint">Use 8+ characters with a mix of letters and numbers.</div>
          </div>

          <label class="form-terms">
            <input type="checkbox" style="margin-top: 2px;">
            <span>I agree to Slima's <a href="#">Terms</a> and <a href="#">Privacy Policy</a>, and to receive product updates by email.</span>
          </label>

          <button type="submit" class="btn btn--primary btn--block btn--lg">Create account</button>
        </form>
      </div>

      <footer class="auth-form__foot">
        <span>© 2026 Slima</span>
        <span><a href="#">Privacy</a><a href="mailto:service@slima.ai">Support</a></span>
      </footer>
    </section>

  </div>
</div>

</body>
</html>
